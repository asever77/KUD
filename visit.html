			<main class="body-wrap">
				<div class="body-tit">
					<h2>찾아오시는 길</h2>
				</div>

				<div id="map_daum" class="kud_map"></div>
				<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=cfecbb8fda5b09717653fae78202c3f7&libraries=services"></script>
				<script>
					var mapContainer = document.getElementById('map_daum'), // 지도를 표시할 div 
						mapOption = {
							center: new daum.maps.LatLng(33.450701, 126.570667), // 지도의 중심좌표
							level: 3 // 지도의 확대 레벨
						};  
					
					// 지도를 생성합니다    
					var map = new daum.maps.Map(mapContainer, mapOption); 
					// 주소-좌표 변환 객체를 생성합니다
					var geocoder = new daum.maps.services.Geocoder();
					// 주소로 좌표를 검색합니다

					geocoder.addressSearch('서울특별시 성동구 연무장5가길 7', function(result, status) {

						// 정상적으로 검색이 완료됐으면 
						if (status === daum.maps.services.Status.OK) {

							var coords = new daum.maps.LatLng(result[0].y, result[0].x);

							// 결과값으로 받은 위치를 마커로 표시합니다
							var marker = new daum.maps.Marker({
								map: map,
								position: coords
							});

							// 인포윈도우로 장소에 대한 설명을 표시합니다
							var infowindow = new daum.maps.InfoWindow({
								content: '<div class="map-tip"><strong>주식회사 케이유디</strong><span><i class="material-icons">location_on</i>서울특별시 성동구 연무장5가길 7, <br>E1107호, E1108호(성수동2가, 성수역현대테라스타워)</span></div>'
							});
							infowindow.open(map, marker);

							// 지도의 중심을 결과값으로 받은 위치로 이동시킵니다
							map.setCenter(coords);
						} 
					});       
				</script>
